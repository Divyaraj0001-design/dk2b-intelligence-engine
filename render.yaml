services:
  # ── FastAPI Backend (Free Web Service) ──────────────────────────────────────
  - type: web
    name: dk2b-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEYS
        sync: false   # Add this in Render Dashboard → Environment tab
